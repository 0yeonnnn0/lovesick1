services:
  discord-bot:
    image: ghcr.io/0yeonnnn0/lovesick1:latest
    container_name: lovesick1
    restart: unless-stopped
    ports:
      - "9482:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ${CODEX_AUTH_DIR:-./.codex}:/root/.codex
